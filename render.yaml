# Render Blueprint: social-agent cron job only.
# In Render: New → Blueprint → connect repo → Blueprint path: render.yaml (default)
#
# Required env vars (set in Render Dashboard → chart-social-agent → Environment):
#
#   Analysis — prefer OPENAI_API_KEY (recommended for cron; avoids Vercel blocking):
#     OPENAI_API_KEY = your OpenAI API key
#   Alternative: CHART_ANALYTIC_URL + ANALYZE_IMAGE_SECRET (can be blocked by Vercel Security Checkpoint)
#
#   For posting to X (required unless using --dry-run):
#     X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET
#
# Chrome for Puppeteer is installed in build so the cron can capture/screenshot.

services:
  - type: cron
    name: chart-social-agent
    runtime: node
    plan: starter
    # Run at 07:00, 12:00, 15:00, 17:00, 20:00 UTC; run.js adds 1–5 min jitter before starting
    schedule: "0 7,12,15,18,20 * * *"
    # Install Chrome into project dir (absolute path required by puppeteer install) so it's in the uploaded build
    buildCommand: npm install && PUPPETEER_CACHE_DIR=$(pwd)/.cache/puppeteer npx puppeteer browsers install chrome
    startCommand: node social-agent/run.js