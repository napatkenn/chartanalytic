# Render Blueprint: two cron jobs — (1) Polymarket only, (2) Social (forex) only.
#
# Set env vars in Render Dashboard → each cron service → Environment:
#   chart-polymarket: OPENAI_API_KEY, POLYMARKET_PRIVATE_KEY (0x...). Optional: PROXY_URL=http://host:80 to route traffic via proxy (e.g. Mexico) and avoid Polymarket geoblock when Render is in Germany.
#   chart-social-agent: OPENAI_API_KEY, X_API_KEY, X_API_SECRET, X_ACCESS_TOKEN, X_ACCESS_TOKEN_SECRET
#
# Chrome for Puppeteer is installed in build so both crons can capture/screenshot.

services:
  # 1) Polymarket: BTC/ETH/SOL/XRP every 15 min. No social post.
  - type: cron
    name: chart-polymarket
    runtime: node
    plan: starter
    schedule: "0,15,30,45 * * * *"
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: PUPPETEER_CACHE_DIR=$(pwd)/.cache/puppeteer node social-agent/run.js --predict

  # 2) Social: EUR/USD, GBP/USD, XAU/USD, USD/JPY, AUD/USD at their hours. Posts to X.
  - type: cron
    name: chart-social-agent
    runtime: node
    plan: starter
    schedule: "0 7,12,15,17,20 * * *"
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: PUPPETEER_CACHE_DIR=$(pwd)/.cache/puppeteer node social-agent/run.js