# Render Blueprint: social-agent cron job only.
# In Render: New → Blueprint → connect repo → Blueprint path: render.yaml (default)
# Add env vars in Dashboard (X_API_*, CHART_ANALYTIC_URL, ANALYZE_IMAGE_SECRET, etc.)

services:
  - type: cron
    name: chart-social-agent
    runtime: node
    plan: starter
    # Run at 07:00, 12:00, 15:00, 17:00, 20:00 UTC (run.js runs all schedules due at current hour)
    schedule: "0 7,12,15,17,20 * * *"
    buildCommand: npm install
    startCommand: node social-agent/run.js
