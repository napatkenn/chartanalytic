# fly.toml app configuration file generated for chartanalytic-cron on 2026-02-21T22:03:49+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chartanalytic-cron'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile.cron'

[env]
  NODE_ENV = 'production'

[processes]
  cron = 'supercronic /app/crontab'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
