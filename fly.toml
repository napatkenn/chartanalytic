# Fly.io app for chartanalytic social-agent cron (Supercronic).
# https://fly.io/docs/blueprints/supercronic/
#
# First time: fly launch  (use Dockerfile.cron)
# Secrets:    fly secrets set OPENAI_API_KEY=sk-... POLYMARKET_PRIVATE_KEY=0x...
# Deploy:     fly deploy
# Scale:      fly scale count cron=1   (only one cron process)

app = "chartanalytic-cron"

[build]
  dockerfile = "Dockerfile.cron"

[env]
  NODE_ENV = "production"

[processes]
  cron = "supercronic /app/crontab"
