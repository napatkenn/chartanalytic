# Polymarket prediction bot: capture BTC/ETH/SOL/XRP 1M charts, analyze, place predictions.
# Schedule: every 15 minutes (0, 15, 30, 45) UTC.
# GitHub runners are often US-based; Polymarket blocks US. Set PROXY_URL to a proxy in an allowed
# region (e.g. eu-west-1), or use a self-hosted runner / VPS cron. See CRON-GEOBLOCK.md.
name: Polymarket cron

on:
  schedule:
    - cron: "0,15,30,45 * * * *"
  workflow_dispatch:

jobs:
  polymarket:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      POLYMARKET_PRIVATE_KEY: ${{ secrets.POLYMARKET_PRIVATE_KEY }}
      POLYMARKET_MAX_SIZE_USD: ${{ secrets.POLYMARKET_MAX_SIZE_USD || '1' }}
      POLYMARKET_MIN_CONFIDENCE: ${{ secrets.POLYMARKET_MIN_CONFIDENCE || '65' }}
      POLYMARKET_API_KEY: ${{ secrets.POLYMARKET_API_KEY }}
      POLYMARKET_API_SECRET: ${{ secrets.POLYMARKET_API_SECRET }}
      POLYMARKET_PASSPHRASE: ${{ secrets.POLYMARKET_PASSPHRASE }}
      PROXY_URL: ${{ secrets.PROXY_URL }}
      PROXY_LIST_URL: ${{ secrets.PROXY_LIST_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Polymarket pipeline
        run: node social-agent/run.js --predict
